name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build panel
        run: npm run build

      - name: Commit built panel.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f custom_components/esphome_epaper_konfigurator/www/panel.js
          git diff --cached --quiet || git commit -m "chore: build panel.js for ${{ github.ref_name }}"
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ESPHome e-Paper Konfigurator ${{ github.ref_name }}"
          body: |
            ## ESPHome e-Paper Konfigurator ${{ github.ref_name }}

            ### HACS Installation
            1. HACS → Custom Repositories → `https://github.com/michi-walchsi/esphome-epaper-konfigurator` (Integration)
            2. Installieren → HA neu starten
            3. Einstellungen → Integrationen → ESPHome ePaper Konfigurator → Hinzufügen
            4. Konfigurator erscheint in der Seitenleiste ✅

            ### Manuelle Installation
            `panel.js` herunterladen → nach `/config/custom_components/esphome_epaper_konfigurator/www/panel.js` kopieren.
          files: |
            custom_components/esphome_epaper_konfigurator/www/panel.js
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
